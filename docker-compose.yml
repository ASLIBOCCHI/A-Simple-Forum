version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: padlet-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: padlet-backend
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://root:rootpassword@mongodb:27017/padlet?authSource=admin
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: padlet-frontend
    ports:
      - "5173:80" 
    depends_on:
      - backend

volumes:
  mongodb_data:
